<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲通關護照</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --ink-900:#1B2430;
    --ink-800:#232E3D;
    --ink-700:#324056;
    --ink-600:#5A6A80;
    --paper-100:#F3ECDA;
    --paper-200:#E7D9B7;
    --paper-300:#D7C296;
    --stamp-red:#B0403A;
    --brass:#B08D57;
    --navy:#24344A;
    --plum:#6B4C6E;
    --teal:#1F5C56;
    --amber:#8A5A22;
    --gray:#5A5648;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink-900);
    color:var(--paper-100);
    font-family:'Noto Sans TC',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .serif{font-family:'Noto Serif TC',serif;}
  a{color:inherit;}
  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:64px 24px 40px;
    text-align:center;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(176,141,87,0.18), transparent 60%),
      var(--ink-900);
    border-bottom:1px solid rgba(176,141,87,0.35);
    overflow:hidden;
  }
  .hero::before, .hero::after{
    content:"";
    position:absolute;
    left:50%;
    width:1px;
    height:100%;
    background:repeating-linear-gradient(to bottom, rgba(176,141,87,0.25) 0 6px, transparent 6px 14px);
  }
  .hero::before{transform:translateX(-260px);}
  .hero::after{transform:translateX(260px);}
  .eyebrow{
    letter-spacing:0.35em;
    font-size:12px;
    color:var(--brass);
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .hero h1{
    font-size:clamp(34px,6vw,64px);
    margin:0 0 14px;
    letter-spacing:0.06em;
  }
  .hero p.sub{
    color:var(--paper-200);
    max-width:520px;
    margin:0 auto 32px;
    line-height:1.8;
    font-size:15px;
  }
  .stamp-row{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:34px;
  }
  .stamp-count{
    position:relative;
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:140px;
    height:140px;
    border:3px double var(--stamp-red);
    border-radius:50%;
    color:var(--stamp-red);
    transform:rotate(-7deg);
    background:rgba(176,64,58,0.05);
  }
  .stamp-count.pending{
    border-style:dashed;
    border-color:var(--brass);
    color:var(--brass);
    transform:rotate(6deg);
    background:rgba(176,141,87,0.05);
  }
  .stamp-count .num{
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:38px;
    line-height:1;
  }
  .stamp-count .label{
    font-size:10.5px;
    letter-spacing:0.18em;
    margin-top:6px;
  }
  /* 下一站 callout */
  .next-up{
    max-width:520px;
    margin:0 auto;
    border:1px solid var(--brass);
    border-radius:6px;
    background:rgba(176,141,87,0.08);
    padding:18px 24px;
    text-align:left;
    position:relative;
  }
  .next-up .nu-tag{
    position:absolute;
    top:-11px;
    left:20px;
    background:var(--ink-900);
    padding:0 10px;
    font-size:11px;
    letter-spacing:0.2em;
    color:var(--brass);
    font-family:'JetBrains Mono',monospace;
  }
  .next-up .nu-title{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:19px;
    color:var(--paper-100);
    margin-bottom:6px;
  }
  .next-up .nu-meta{
    font-size:13px;
    color:var(--paper-200);
  }
  .next-up.empty{
    color:var(--ink-600);
    font-size:13px;
    text-align:center;
    border-style:dashed;
  }
  .next-up.empty a{
    color:var(--brass);
    text-decoration:underline;
  }
  .hero-meta{
    margin-top:22px;
    font-size:12px;
    color:var(--ink-600);
  }
  .hero-meta .mono{color:var(--brass);}
  /* ---------- STATS ---------- */
  .stats-wrap{
    background:var(--paper-100);
    color:var(--ink-900);
    padding:40px 24px 8px;
  }
  .stats-caption{
    max-width:1100px;
    margin:0 auto 18px;
    font-size:12px;
    color:var(--ink-700);
    font-family:'JetBrains Mono',monospace;
  }
  .stats-grid{
    max-width:1100px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:22px;
  }
  .stat-card{
    background:var(--paper-100);
    border:1px solid var(--paper-300);
    border-radius:4px;
    padding:20px 22px;
    position:relative;
  }
  .stat-card h3{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-700);
    margin:0 0 14px;
  }
  .stat-card canvas{max-height:180px;}
  .bar-list{list-style:none;margin:0;padding:0;font-size:13px;}
  .bar-list li{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .bar-list .bname{width:52px;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
  .bar-list .btrack{flex:1;height:8px;background:var(--paper-300);border-radius:4px;overflow:hidden;}
  .bar-list .bfill{height:100%;background:var(--navy);}
  .bar-list .bval{width:24px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-700);}
  /* ---------- CONTROLS ---------- */
  .controls{
    max-width:1100px;
    margin:36px auto 0;
    padding:0 24px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  .controls input[type="text"]{
    flex:1;
    min-width:180px;
    padding:11px 14px;
    border:1px solid var(--ink-700);
    background:transparent;
    color:var(--ink-900);
    border-radius:2px;
    font-size:14px;
    font-family:'Noto Sans TC',sans-serif;
  }
  .controls select{
    padding:11px 10px;
    border:1px solid var(--ink-700);
    background:var(--paper-100);
    color:var(--ink-900);
    border-radius:2px;
    font-size:13px;
    font-family:'Noto Sans TC',sans-serif;
  }
  .sort-btn{
    padding:11px 16px;
    border:1px solid var(--ink-900);
    background:var(--ink-900);
    color:var(--paper-100);
    border-radius:2px;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .sort-btn:hover{background:var(--ink-700);}
  .result-count{
    max-width:1100px;
    margin:14px auto 0;
    padding:0 26px;
    font-size:12px;
    color:var(--ink-700);
    font-family:'JetBrains Mono',monospace;
  }
  /* ---------- LIST ---------- */
  .list-wrap{
    background:var(--paper-100);
    padding:20px 24px 90px;
  }
  .list{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .card{
    position:relative;
    display:grid;
    grid-template-columns:110px 1fr 130px;
    gap:0;
    height:150px;
    background:#FBF7EC;
    border:1px solid var(--paper-300);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 1px 0 rgba(0,0,0,0.03);
  }
  .card.pending{
    border-style:dashed;
    border-color:var(--brass);
  }
  @media (max-width:640px){
    .card{grid-template-columns:88px 1fr;height:auto;}
    .card .card-img{display:none;}
  }
  .card-date{
    background:var(--ink-900);
    color:var(--paper-100);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:14px 6px;
    position:relative;
  }
  .card-date.pending{
    background:transparent;
    color:var(--ink-900);
    border-right:2px dashed var(--brass);
  }
  .card-date::after{
    content:"";
    position:absolute;
    right:-9px; top:0; bottom:0;
    width:18px;
    background-image:radial-gradient(circle, var(--paper-100) 4px, transparent 4.5px);
    background-size:18px 18px;
    background-position:center;
  }
  .card-date.pending::after{ background-image:radial-gradient(circle, #FBF7EC 4px, transparent 4.5px); }
  .card-date .day{font-family:'Noto Serif TC',serif;font-weight:900;font-size:28px;line-height:1;}
  .card-date .my{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:6px;letter-spacing:0.05em;color:var(--brass);}
  .card-date.pending .my{color:var(--ink-700);}
  .card-body{
    padding:14px 22px 14px 26px;
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:0;
    overflow:hidden;
  }
  .card-title{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:18px;
    color:var(--ink-900);
    line-height:1.4;
  }
  .card-sub{
    font-size:13px;
    color:var(--ink-700);
  }
  .card-sub .dot{margin:0 6px;color:var(--paper-300);}
  .badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .badge{
    display:inline-block;
    padding:4px 10px;
    font-size:11px;
    letter-spacing:0.08em;
    border-radius:3px;
    color:#fff;
    width:fit-content;
    transform:rotate(-2deg);
  }
  .badge.type-密室{background:var(--navy);}
  .badge.type-LARP{background:var(--plum);}
  .badge.type-沉浸式體驗{background:var(--teal);}
  .badge.type-實境解謎{background:var(--amber);}
  .badge.type-default{background:var(--gray);}
  .pending-tag{
    position:absolute;
    top:12px;
    right:12px;
    padding:4px 11px;
    font-size:11px;
    letter-spacing:0.08em;
    border:1.5px dashed var(--brass);
    border-radius:3px;
    color:var(--brass);
    background:rgba(243,236,218,0.9);
    transform:rotate(4deg);
    z-index:2;
  }
  .note-block{
    font-size:12.5px;
    color:var(--ink-700);
    background:var(--paper-100);
    border-left:2px solid var(--paper-300);
    padding:4px 12px;
    border-radius:2px;
    height:38px;
    line-height:19px;
    white-space:pre-line;
    overflow:hidden;
  }
  .note-block.expanded{
    height:auto;
    overflow:visible;
  }
  .note-toggle{
    align-self:flex-start;
    margin:2px 0 0;
    padding:0 2px;
    border:1px solid var(--paper-300);
    border-radius:3px;
    background:none;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    line-height:16px;
    width:18px;
    height:18px;
    text-align:center;
    color:var(--brass);
    cursor:pointer;
  }
  .card.expanded{ height:auto; }
  .card.expanded .card-body{ overflow:visible; }
  .card-img{
    background:var(--paper-200);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    width:100%;
    height:100%;
  }
  .card-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .card-img svg{width:32px;height:32px;opacity:0.35;}
  .state-msg{
    max-width:600px;
    margin:60px auto;
    text-align:center;
    color:var(--ink-700);
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    line-height:2;
  }
  .state-msg .big{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--ink-900);display:block;margin-bottom:10px;}
  .retry-btn{
    margin-top:14px;
    padding:9px 18px;
    background:var(--ink-900);
    color:var(--paper-100);
    border:none;
    border-radius:3px;
    cursor:pointer;
    font-size:13px;
  }
  footer{
    text-align:center;
    padding:26px 20px 40px;
    font-size:11px;
    color:var(--ink-600);
    font-family:'JetBrains Mono',monospace;
    background:var(--paper-100);
  }
  footer a{color:var(--brass);}
</style>
</head>
<body>
<section class="hero">
  <div class="eyebrow">TAIWAN GAME LOG</div>
  <h1 class="serif">遊戲通關護照</h1>
  <p class="sub">每一場密室、LARP、沉浸式體驗與實境解謎，都是護照上的一枚戳章。</p>
  <div class="stamp-row">
    <div class="stamp-count">
      <div class="num mono" id="stat-total">--</div>
      <div class="label serif">已通關</div>
    </div>
  </div>
  <div id="next-up-wrap"></div>
  <div class="hero-meta">資料同步於 <span class="mono" id="sync-time">--</span></div>
</section>
<section class="stats-wrap">
  <div class="stats-caption">※ 以下統計僅計入「已通關」場次</div>
  <div class="stats-grid">
    <div class="stat-card">
      <h3>類型分布</h3>
      <canvas id="chart-type"></canvas>
    </div>
    <div class="stat-card">
      <h3>縣市排行</h3>
      <ul class="bar-list" id="city-bars"></ul>
    </div>
    <div class="stat-card">
      <h3>每年場次</h3>
      <canvas id="chart-year"></canvas>
    </div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="搜尋主題或工作室…">
    <select id="filter-status">
      <option value="">全部狀態</option>
      <option value="cleared">已通關</option>
      <option value="pending">預定中</option>
    </select>
    <select id="filter-city"><option value="">全部縣市</option></select>
    <select id="filter-type"><option value="">全部類型</option></select>
    <select id="filter-studio"><option value="">全部工作室</option></select>
    <button class="sort-btn" id="sort-btn">由新到舊 ↓</button>
  </div>
  <div class="result-count" id="result-count"></div>
</section>
<section class="list-wrap">
  <div class="list" id="list"></div>
</section>
<footer>
  資料來源：Google Sheet（自動同步，含心得筆記）<br>
  <a id="sheet-link" href="#" target="_blank" rel="noopener">前往 Google Sheet 編輯資料 →</a><br>
  DESIGN — 遊戲通關護照 v2
</footer>
<script>
/* ====== 設定：你的 Google Sheet ====== */
const SHEET_ID = "1YrMVUN0sHSPw4P9sVtHuL298OV_YRNAtWAh_L3mOTug";
const GID = "0";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
document.getElementById("sheet-link").href = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;
const TYPE_COLORS = {
  "密室": "#24344A",
  "LARP": "#6B4C6E",
  "沉浸式體驗": "#1F5C56",
  "實境解謎": "#8A5A22"
};
let RAW = [];
let TODAY = new Date();
TODAY.setHours(0,0,0,0);
let state = { search:"", city:"", type:"", studio:"", status:"", sortDesc:true };
const el = id => document.getElementById(id);
function parseDate(str){
  if(!str) return null;
  const parts = str.split("/").map(s=>parseInt(s,10));
  if(parts.length<3 || parts.some(isNaN)) return null;
  const [y,m,d] = parts;
  return new Date(y, m-1, d);
}
function fmtDate(dateObj, raw){
  if(!dateObj) return {day:"?", my:raw||""};
  const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  return { day: String(dateObj.getDate()).padStart(2,"0"), my: MONTHS[dateObj.getMonth()]+" "+dateObj.getFullYear() };
}
function placeholderSVG(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="#3A4552" stroke-width="1.5"><rect x="5" y="10" width="14" height="10" rx="1.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>`;
}
function handleImgError(imgEl){
  imgEl.parentElement.innerHTML = placeholderSVG();
}
function renderNextUp(){
  const upcoming = RAW.filter(r=>r._status==="pending" && r._date).sort((a,b)=>a._date-b._date);
  const wrap = el("next-up-wrap");
  if(upcoming.length===0){
    wrap.innerHTML = `<div class="next-up empty">還沒有排定下一場冒險，好手癢，趕快訂一場密室吧！ · <a href="${document.getElementById("sheet-link").href}" target="_blank">到 Google Sheet 新增預約</a></div>`;
    return;
  }
  const r = upcoming[0];
  const days = Math.ceil((r._date - TODAY)/86400000);
  const tag = days===0 ? "就是今天" : (days>0 ? `${days} 天後` : "已錯過安排日期");
  wrap.innerHTML = `
    <div class="next-up">
      <div class="nu-tag">${tag}</div>
      <div class="nu-title serif">${escapeHtml(r["主題"]||"")}</div>
      <div class="nu-meta">${escapeHtml(r["日期"]||"")}　·　${escapeHtml(r["縣市"]||"")}　·　${escapeHtml(r["工作室"]||"")}</div>
    </div>`;
}
function render(){
  let rows = RAW.filter(r=>{
    if(state.city && r["縣市"]!==state.city) return false;
    if(state.type && r["類型"]!==state.type) return false;
    if(state.studio && r["工作室"]!==state.studio) return false;
    if(state.status && r._status!==state.status) return false;
    if(state.search){
      const q = state.search.toLowerCase();
      const hay = ((r["主題"]||"")+" "+(r["工作室"]||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  rows.sort((a,b)=>{
    const da = a._date ? a._date.getTime() : 0;
    const db = b._date ? b._date.getTime() : 0;
    return state.sortDesc ? db-da : da-db;
  });
  el("result-count").textContent = `顯示 ${rows.length} / ${RAW.length} 筆紀錄`;
  const listEl = el("list");
  if(rows.length===0){
    listEl.innerHTML = `<div class="state-msg"><span class="big">查無符合的檔案</span>試試調整搜尋條件或篩選項目。</div>`;
    return;
  }
  listEl.innerHTML = rows.map((r,i)=>{
    const {day,my} = fmtDate(r._date, r["日期"]);
    const type = r["類型"] || "";
    const isPending = r._status==="pending";
    const badgeClass = "type-"+(TYPE_COLORS[type] ? type : "default");
    const img = r["封面圖網址"];
    const note = (r["心得筆記"]||"").trim();
    const needsToggle = note && (/[\n\r\u2028\u2029]/.test(note) || note.length>50);
    const preview = note ? makePreview(note) : "";
    return `
    <div class="card ${isPending?'pending':''}" id="card-${i}">
      <div class="card-date ${isPending?'pending':''}">
        <div class="day mono">${day}</div>
        <div class="my mono">${my}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${escapeHtml(r["主題"]||"（未命名）")}</div>
        <div class="card-sub">${escapeHtml(r["工作室"]||"")}<span class="dot">·</span>${escapeHtml(r["縣市"]||"")}</div>
        <div class="badge-row">
          ${type ? `<span class="badge ${badgeClass}">${escapeHtml(type)}</span>` : ""}
        </div>
        ${isPending ? `<span class="pending-tag">即將挑戰</span>` : ""}
        ${note ? `<div class="note-block" id="note-${i}" data-full="${escapeAttr(note)}">${escapeHtml(preview)}</div>` : ""}
        ${needsToggle ? `<button class="note-toggle" data-idx="${i}">+</button>` : ""}
      </div>
      <div class="card-img">
        ${img ? `<img src="${escapeAttr(img)}" alt="" loading="lazy" onerror="handleImgError(this)">` : placeholderSVG()}
      </div>
    </div>`;
  }).join("");
  listEl.querySelectorAll(".note-toggle").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const idx = btn.dataset.idx;
      const noteEl = el("note-"+idx);
      const cardEl = el("card-"+idx);
      const expanded = noteEl.classList.toggle("expanded");
      cardEl.classList.toggle("expanded", expanded);
      noteEl.textContent = expanded ? noteEl.dataset.full : makePreview(noteEl.dataset.full);
      btn.textContent = expanded ? "－" : "+";
    });
  });
}
function makePreview(note){
  const oneLine = note.replace(/[\n\r\u2028\u2029]+/g," ").replace(/\s+/g," ").trim();
  return oneLine.length>50 ? oneLine.slice(0,50)+"…" : oneLine;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }
function populateFilters(){
  const cities = [...new Set(RAW.map(r=>r["縣市"]).filter(Boolean))].sort();
  const types = [...new Set(RAW.map(r=>r["類型"]).filter(Boolean))].sort();
  const studios = [...new Set(RAW.map(r=>r["工作室"]).filter(Boolean))].sort();
  const fill = (id, arr) => {
    const s = el(id);
    arr.forEach(v=>{
      const o = document.createElement("option");
      o.value=v; o.textContent=v;
      s.appendChild(o);
    });
  };
  fill("filter-city", cities);
  fill("filter-type", types);
  fill("filter-studio", studios);
}
function renderStats(){
  const cleared = RAW.filter(r=>r._status==="cleared");
  el("stat-total").textContent = cleared.length;
  const typeCounts = {};
  cleared.forEach(r=>{ const t=r["類型"]||"其他"; typeCounts[t]=(typeCounts[t]||0)+1; });
  new Chart(el("chart-type"), {
    type:"doughnut",
    data:{
      labels:Object.keys(typeCounts),
      datasets:[{
        data:Object.values(typeCounts),
        backgroundColor:Object.keys(typeCounts).map(t=>TYPE_COLORS[t]||"#5A5648"),
        borderColor:"#F3ECDA",
        borderWidth:2
      }]
    },
    options:{
      plugins:{legend:{position:"bottom",labels:{boxWidth:10,font:{size:10,family:"Noto Sans TC"},color:"#324056"}}},
      cutout:"62%"
    }
  });
  const cityCounts = {};
  cleared.forEach(r=>{ const c=r["縣市"]||"其他"; cityCounts[c]=(cityCounts[c]||0)+1; });
  const maxC = Math.max(1, ...Object.values(cityCounts));
  const sortedCities = Object.entries(cityCounts).sort((a,b)=>b[1]-a[1]);
  el("city-bars").innerHTML = sortedCities.map(([city,count])=>`
    <li>
      <span class="bname">${escapeHtml(city)}</span>
      <span class="btrack"><span class="bfill" style="width:${(count/maxC*100).toFixed(0)}%"></span></span>
      <span class="bval">${count}</span>
    </li>`).join("");
  const yearCounts = {};
  cleared.forEach(r=>{
    if(!r._date) return;
    const y = r._date.getFullYear();
    yearCounts[y] = (yearCounts[y]||0)+1;
  });
  const years = Object.keys(yearCounts).sort();
  new Chart(el("chart-year"), {
    type:"bar",
    data:{
      labels:years,
      datasets:[{ data:years.map(y=>yearCounts[y]), backgroundColor:"#24344A", borderRadius:2 }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:9,family:"JetBrains Mono"},color:"#5A6A80"},grid:{display:false}},
        y:{display:false}
      }
    }
  });
}
function attachControls(){
  el("search").addEventListener("input", e=>{ state.search=e.target.value; render(); });
  el("filter-city").addEventListener("change", e=>{ state.city=e.target.value; render(); });
  el("filter-type").addEventListener("change", e=>{ state.type=e.target.value; render(); });
  el("filter-studio").addEventListener("change", e=>{ state.studio=e.target.value; render(); });
  el("filter-status").addEventListener("change", e=>{ state.status=e.target.value; render(); });
  el("sort-btn").addEventListener("click", ()=>{
    state.sortDesc = !state.sortDesc;
    el("sort-btn").textContent = state.sortDesc ? "由新到舊 ↓" : "由舊到新 ↑";
    render();
  });
}
async function load(){
  el("list").innerHTML = `<div class="state-msg"><span class="big">正在查閱檔案庫…</span>連線至 Google Sheet 中</div>`;
  try{
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const csvText = await res.text();
    const parsed = Papa.parse(csvText, { header:true, skipEmptyLines:true });
    RAW = parsed.data
      .filter(r=>r["主題"] && r["主題"].trim()!=="")
      .map(r=>{
        const d = parseDate(r["日期"]);
        return {...r, _date:d, _status: (d && d>TODAY) ? "pending" : "cleared"};
      });
    el("sync-time").textContent = new Date().toLocaleString("zh-TW", {hour12:false});
    populateFilters();
    renderNextUp();
    renderStats();
    attachControls();
    render();
  }catch(err){
    el("list").innerHTML = `<div class="state-msg">
      <span class="big">資料庫連線失敗</span>
      無法讀取 Google Sheet：${escapeHtml(err.message)}<br>
      請確認試算表的共用設定為「知道連結的使用者均可檢視」。
      <br><button class="retry-btn" onclick="load()">重新嘗試</button>
    </div>`;
  }
}
load();
</script>
</body>
</html>
